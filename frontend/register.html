<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <h1>Дневник благодарностей</h1>
    <div class="auth-card">
      <h2>Регистрация</h2>
      <input type="text" id="registerUsername" placeholder="Имя пользователя">
      <input type="password" id="registerPassword" placeholder="Пароль (минимум 4 символа)">
      <button id="registerBtn" class="btn-primary">Зарегистрироваться</button>
      <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
      <div id="registerError" class="error"></div>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
